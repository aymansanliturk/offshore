<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maritime Intel — Denmark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nordic-sand: #F4F1EA;
            --nordic-sea: #8E9AAF;
            --nordic-sky: #CBCFD8;
            --nordic-sage: #A7AD9B;
            --nordic-slate: #2C3333;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--nordic-sand);
            color: var(--nordic-slate);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 40px rgba(0,0,0,0.04);
        }
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: loading 2s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--nordic-sand); }
        ::-webkit-scrollbar-thumb { background: var(--nordic-sky); border-radius: 10px; }
    </style>
</head>
<body class="selection:bg-sage-200">

    <div class="max-w-[1400px] mx-auto px-6 py-12">
        <!-- Minimalist Top Navigation -->
        <nav class="flex justify-between items-end mb-16">
            <div>
                <span class="text-[10px] font-extrabold uppercase tracking-[0.3em] text-slate-400 mb-2 block">Copenhagen / Intelligence</span>
                <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">Offshore <span class="text-slate-400 font-light">Radar</span></h1>
            </div>
            <div class="flex items-center gap-6">
                <div id="sync-status" class="hidden md:block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Feed: Live</div>
                <button onclick="refreshRadar()" class="w-12 h-12 flex items-center justify-center rounded-full glass-card hover:rotate-180 transition-all duration-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
        </nav>

        <!-- Bento Grid Layout -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            
            <!-- Strategic Monitoring (Left Column) -->
            <div class="md:col-span-4 space-y-6">
                <div class="glass-card p-8 rounded-[2.5rem] relative overflow-hidden group">
                    <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-6">Strategic Nodes</h2>
                    <div class="space-y-6">
                        <div class="flex justify-between items-center group/item cursor-help">
                            <span class="text-sm font-semibold text-slate-700 group-hover/item:text-blue-600">Thor Wind Farm</span>
                            <span class="text-[10px] px-2 py-1 bg-blue-50 text-blue-600 rounded-md font-bold uppercase">Construction</span>
                        </div>
                        <div class="flex justify-between items-center group/item cursor-help">
                            <span class="text-sm font-semibold text-slate-700 group-hover/item:text-emerald-600">North Sea Island</span>
                            <span class="text-[10px] px-2 py-1 bg-emerald-50 text-emerald-600 rounded-md font-bold uppercase">Technical Design</span>
                        </div>
                        <div class="flex justify-between items-center group/item cursor-help">
                            <span class="text-sm font-semibold text-slate-700 group-hover/item:text-amber-600">Hesselø Project</span>
                            <span class="text-[10px] px-2 py-1 bg-amber-50 text-amber-600 rounded-md font-bold uppercase">Consultation</span>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden group">
                    <div class="relative z-10">
                        <p class="text-[10px] font-bold text-blue-400 uppercase tracking-[0.2em] mb-4">Official Portals</p>
                        <div class="grid grid-cols-2 gap-4">
                            <a href="https://energinet.dk/en" target="_blank" class="p-4 bg-white/5 rounded-2xl hover:bg-white/10 transition-colors">
                                <span class="block text-xs font-bold mb-1">Energinet</span>
                                <span class="text-[9px] text-slate-500">Grid Data</span>
                            </a>
                            <a href="https://ens.dk/en" target="_blank" class="p-4 bg-white/5 rounded-2xl hover:bg-white/10 transition-colors">
                                <span class="block text-xs font-bold mb-1">DEA</span>
                                <span class="text-[9px] text-slate-500">Legal</span>
                            </a>
                        </div>
                    </div>
                    <!-- Subtle compass icon in background -->
                    <svg class="absolute -bottom-10 -right-10 w-48 h-48 text-white/5 rotate-12" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2z"></path></svg>
                </div>
            </div>

            <!-- News Radar (Main Column) -->
            <div class="md:col-span-8">
                <div id="radar-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <!-- Dynamic Items -->
                </div>
            </div>

        </div>

        <footer class="mt-24 pt-12 border-t border-slate-200/50 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-4">
                <div class="w-8 h-[1px] bg-slate-300"></div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic">Real-time Maritime Intelligence Node</p>
            </div>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest">© 2026 Forecast.bid — Copenhagen Sector</p>
        </footer>
    </div>

    <script>
        const FEEDS = [
            { name: "Global Intelligence", url: "https://news.google.com/rss/search?q=offshore+wind+denmark+orsted+vestas+energinet&hl=en-US&gl=US&ceid=US:en" },
            { name: "Market News", url: "https://www.offshorewind.biz/tag/denmark/feed/" }
        ];

        async function fetchRSS(feed) {
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(feed.url)}`;
            try {
                const res = await fetch(proxy);
                const data = await res.json();
                const parser = new DOMParser();
                const xml = parser.parseFromString(data.contents, "text/xml");
                const items = xml.querySelectorAll("item");
                
                return Array.from(items).map(item => ({
                    title: item.querySelector("title")?.textContent,
                    link: item.querySelector("link")?.textContent,
                    pubDate: new Date(item.querySelector("pubDate")?.textContent),
                    source: feed.name
                }));
            } catch (e) { return []; }
        }

        async function refreshRadar() {
            const container = document.getElementById('radar-grid');
            const status = document.getElementById('sync-status');
            
            // Loading State
            container.innerHTML = Array(4).fill(0).map(() => `
                <div class="glass-card p-8 rounded-[2.5rem] space-y-4">
                    <div class="shimmer h-3 w-20 rounded-full"></div>
                    <div class="shimmer h-5 w-full rounded-lg"></div>
                    <div class="shimmer h-5 w-2/3 rounded-lg"></div>
                </div>
            `).join('');

            const results = await Promise.all(FEEDS.map(fetchRSS));
            const combined = results.flat().sort((a, b) => b.pubDate - a.pubDate).slice(0, 10);

            container.innerHTML = combined.map((item, idx) => {
                const relativeTime = new Intl.RelativeTimeFormat('en', { style: 'short' }).format(
                    Math.ceil((item.pubDate - new Date()) / (1000 * 60 * 60 * 24)), 'day'
                );
                
                return `
                    <div class="glass-card p-8 rounded-[2.5rem] flex flex-col justify-between group">
                        <div>
                            <div class="flex justify-between items-start mb-6">
                                <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">${item.source}</span>
                                <span class="text-[9px] font-bold bg-slate-100 px-2 py-1 rounded text-slate-500">${relativeTime === '0 day' ? 'Today' : relativeTime}</span>
                            </div>
                            <h3 class="text-base font-bold text-slate-800 leading-snug group-hover:text-blue-600 transition-colors">
                                <a href="${item.link}" target="_blank">${item.title}</a>
                            </h3>
                        </div>
                        <div class="mt-8 flex items-center justify-between">
                            <div class="w-10 h-10 rounded-full bg-nordic-sand flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <svg class="w-4 h-4 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            status.textContent = `Feed Active / ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
        }

        window.onload = refreshRadar;
    </script>
</body>
</html>
