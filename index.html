<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offshore Wind Digest — Denmark</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background-color: #f8fafc; color: #1e293b; }
  .card { transition: transform 0.2s; }
  .card:hover { transform: translateY(-2px); }
  .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
  @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body class="p-4 md:p-8">
<div class="max-w-3xl mx-auto">
  <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Wind Energy Digest</h1>
      <p id="meta" class="text-sm text-slate-500 mt-1 italic">Scanning for latest news...</p>
    </div>
    <button id="refreshBtn" onclick="runDigest(true)" class="px-5 py-2 bg-white border border-slate-200 rounded-xl shadow-sm hover:bg-slate-50 active:bg-slate-100 transition-colors flex items-center gap-2 text-sm font-medium">
      <span>⟳</span> Refresh
    </button>
  </header>

  <div id="content" class="space-y-8">
    <!-- Content will be loaded here -->
  </div>

  <footer class="mt-12 pt-6 border-t border-slate-200 text-center text-xs text-slate-400">
    Powered by Gemini 2.5 Flash · Real-time data via Google Search Grounding
  </footer>
</div>

<script>
const apiKey = ""; // Provided automatically by the environment
const appId = typeof __app_id !== 'undefined' ? __app_id : 'wind-digest-app';
const CACHE_KEY = `gemini_digest_cache_${appId}`;

const SECTIONS = [
  { key: "infrastructure", label: "Infrastructure", color: "blue", bg: "bg-blue-50", border: "border-blue-200", text: "text-blue-700" },
  { key: "legislation",    label: "Legislation",    color: "green", bg: "bg-green-50", border: "border-green-200", text: "text-green-700" },
  { key: "approvals",      label: "Approvals",      color: "amber", bg: "bg-amber-50", border: "border-amber-200", text: "text-amber-700" },
  { key: "projects",       label: "Projects",       color: "purple", bg: "bg-purple-50", border: "border-purple-200", text: "text-purple-700" },
];

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const { date, data } = JSON.parse(raw);
    if (date === todayKey()) return data;
  } catch(e) {}
  return null;
}

function saveCache(data) {
  localStorage.setItem(CACHE_KEY, JSON.stringify({ date: todayKey(), data }));
}

function showSkeleton() {
  document.getElementById("meta").textContent = "Searching and summarizing the web...";
  document.getElementById("content").innerHTML = `
    <div class="space-y-4">
      ${[1, 2, 3].map(() => `
        <div class="p-5 bg-white border border-slate-200 rounded-2xl space-y-3">
          <div class="skeleton h-4 w-1/3 rounded"></div>
          <div class="skeleton h-3 w-full rounded"></div>
          <div class="skeleton h-3 w-2/3 rounded"></div>
        </div>
      `).join("")}
    </div>
  `;
}

function showError(msg) {
  document.getElementById("meta").textContent = "An error occurred";
  document.getElementById("content").innerHTML = `
    <div class="p-4 bg-red-50 border border-red-100 text-red-600 rounded-xl text-sm">
      <strong>Error:</strong> ${msg}
    </div>
  `;
  document.getElementById("refreshBtn").disabled = false;
}

function renderDigest(digest) {
  const total = SECTIONS.reduce((s, sec) => s + (digest[sec.key]?.length || 0), 0);
  document.getElementById("meta").textContent = `${digest.date} · Found ${total} items today`;

  const contentHtml = SECTIONS.map(s => {
    const items = digest[s.key] || [];
    const cards = items.length === 0
      ? `<div class="text-sm text-slate-400 py-2">No new items found in this category.</div>`
      : items.map(item => `
          <div class="card bg-white border border-slate-200 rounded-2xl p-5 shadow-sm border-l-4" style="border-left-color: var(--tw-color-${s.color}-500)">
            <div class="text-sm font-semibold mb-2">
              ${item.url ? `<a href="${item.url}" target="_blank" class="hover:text-blue-600 underline-offset-4 decoration-blue-200 decoration-2">${item.title}</a>` : item.title}
            </div>
            <p class="text-sm text-slate-600 leading-relaxed mb-3">${item.summary}</p>
            <div class="flex items-center justify-between text-[11px] text-slate-400 font-medium uppercase tracking-wider">
              <span>${item.source || "Unknown Source"}</span>
            </div>
          </div>
        `).join("");

    return `
      <section>
        <div class="flex items-center gap-2 mb-4">
          <span class="px-3 py-1 ${s.bg} ${s.text} text-[11px] font-bold rounded-full uppercase tracking-widest border ${s.border}">${s.label}</span>
          <div class="h-[1px] flex-1 bg-slate-100"></div>
        </div>
        <div class="grid gap-4">${cards}</div>
      </section>
    `;
  }).join("");

  document.getElementById("content").innerHTML = contentHtml;
  document.getElementById("refreshBtn").disabled = false;
}

async function callGemini(prompt) {
  let delay = 1000;
  for (let i = 0; i < 5; i++) {
    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          tools: [{ "google_search": {} }],
          generationConfig: {
            responseMimeType: "application/json",
            responseSchema: {
              type: "OBJECT",
              properties: {
                date: { type: "STRING" },
                infrastructure: { type: "ARRAY", items: { type: "OBJECT", properties: { title: { type: "STRING" }, summary: { type: "STRING" }, source: { type: "STRING" }, url: { type: "STRING" } } } },
                legislation: { type: "ARRAY", items: { type: "OBJECT", properties: { title: { type: "STRING" }, summary: { type: "STRING" }, source: { type: "STRING" }, url: { type: "STRING" } } } },
                approvals: { type: "ARRAY", items: { type: "OBJECT", properties: { title: { type: "STRING" }, summary: { type: "STRING" }, source: { type: "STRING" }, url: { type: "STRING" } } } },
                projects: { type: "ARRAY", items: { type: "OBJECT", properties: { title: { type: "STRING" }, summary: { type: "STRING" }, source: { type: "STRING" }, url: { type: "STRING" } } } }
              }
            }
          }
        })
      });

      if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
      const result = await response.json();
      const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) throw new Error("API returned an empty response.");
      return JSON.parse(text);
    } catch (err) {
      if (i === 4) throw err;
      await new Promise(resolve => setTimeout(resolve, delay));
      delay *= 2;
    }
  }
}

async function runDigest(forceRefresh = false) {
  if (!forceRefresh) {
    const cached = loadCache();
    if (cached) { renderDigest(cached); return; }
  }

  const btn = document.getElementById("refreshBtn");
  btn.disabled = true;
  showSkeleton();

  const prompt = `Search for news about offshore wind in Denmark from today or the last 48 hours. Scour English, Danish, German, and Dutch sources. 
  Categorize items into: Infrastructure, Legislation, Approvals, and Projects. 
  For each item, provide a short title, a 2-3 sentence summary in English, the source name, and the URL. 
  Return the response in the requested JSON format.`;

  try {
    const digest = await callGemini(prompt);
    saveCache(digest);
    renderDigest(digest);
  } catch(e) {
    showError("Could not fetch the news: " + e.message);
  }
}

window.onload = () => runDigest();
</script>
</body>
</html>
