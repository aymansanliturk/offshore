<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offshore Wind Digest — Denmark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-4 md:p-8">
    <div class="max-w-3xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-slate-200 pb-6">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-900">Offshore Wind Digest</h1>
                <p id="meta-text" class="text-sm text-slate-500 mt-1 italic">Initializing intelligence feed...</p>
            </div>
            <button id="refresh-btn" class="px-5 py-2 bg-white border border-slate-200 rounded-xl shadow-sm hover:bg-slate-50 active:scale-95 transition-all text-sm font-medium flex items-center gap-2">
                <span>⟳</span> Refresh
            </button>
        </header>

        <div id="error-box" class="mb-6 hidden">
            <div class="p-5 bg-red-50 border border-red-200 rounded-2xl">
                <p class="text-sm font-bold text-red-800">Connection Error</p>
                <p id="error-details" class="text-xs text-red-700 mt-1 font-mono break-all"></p>
                <p class="text-[10px] text-red-400 mt-2 italic font-sans italic">Note: If you just added the API key, you MUST push a new commit to GitHub to redeploy.</p>
            </div>
        </div>

        <div id="notice-area" class="mb-6 hidden"></div>
        <div id="content-area" class="space-y-8"></div>

        <footer class="mt-12 pt-6 border-t border-slate-200 text-center text-[10px] text-slate-400 uppercase tracking-widest">
            Powered by Gemini · Automated Maritime Intel
        </footer>
    </div>

    <script>
        const SECTIONS = [
            { id: "infrastructure", label: "Infrastructure", color: "blue" },
            { id: "legislation",    label: "Legislation",    color: "green" },
            { id: "approvals",      label: "Approvals",      color: "amber" },
            { id: "projects",       label: "Projects",       color: "purple" }
        ];

        const UI = {
            reset: () => {
                document.getElementById('content-area').replaceChildren();
                document.getElementById('error-box').classList.add('hidden');
                document.getElementById('notice-area').classList.add('hidden');
            },
            showError: (msg) => {
                document.getElementById('error-details').textContent = msg;
                document.getElementById('error-box').classList.remove('hidden');
                document.getElementById('meta-text').textContent = "Failed to load.";
            },
            showNotice: (msg) => {
                const area = document.getElementById('notice-area');
                area.replaceChildren();
                area.classList.remove('hidden');
                const div = document.createElement('div');
                div.className = "p-4 bg-amber-50 border border-amber-200 rounded-2xl text-xs text-amber-800 font-medium";
                div.textContent = msg;
                area.appendChild(div);
            },
            createSkeleton: () => {
                const container = document.getElementById('content-area');
                for (let i = 0; i < 3; i++) {
                    const skel = document.createElement('div');
                    skel.className = 'p-6 bg-white border border-slate-200 rounded-2xl space-y-4';
                    skel.innerHTML = '<div class="skeleton h-4 w-1/4 rounded"></div><div class="skeleton h-3 w-full rounded"></div>';
                    container.appendChild(skel);
                }
            },
            render: (data) => {
                const container = document.getElementById('content-area');
                container.replaceChildren();
                document.getElementById('meta-text').textContent = `${data.date || 'Today'} · Feed Updated`;

                if (data.isFallback) {
                    UI.showNotice("Real-time search restricted by API quota. Showing latest available AI knowledge.");
                }

                SECTIONS.forEach(sec => {
                    const items = data[sec.id] || [];
                    const section = document.createElement('section');
                    section.innerHTML = `
                        <div class="flex items-center gap-3 mb-4">
                            <span class="px-3 py-1 bg-${sec.color}-50 text-${sec.color}-700 border border-${sec.color}-100 text-[10px] font-bold rounded-full uppercase tracking-tighter">${sec.label}</span>
                            <div class="h-[1px] flex-1 bg-slate-100"></div>
                        </div>`;
                    
                    const grid = document.createElement('div');
                    grid.className = 'grid gap-4';

                    if (items.length === 0) {
                        grid.innerHTML = '<p class="text-xs text-slate-400 italic py-2">No updates found.</p>';
                    } else {
                        items.forEach(item => {
                            const card = document.createElement('div');
                            card.className = `bg-white border border-slate-200 rounded-2xl p-5 border-l-4 border-l-${sec.color}-500 shadow-sm`;
                            card.innerHTML = `
                                <h3 class="text-sm font-bold text-slate-800 mb-2">
                                    ${item.url ? `<a href="${item.url}" target="_blank" class="hover:text-blue-600 underline underline-offset-4 decoration-slate-200">${item.title}</a>` : item.title}
                                </h3>
                                <p class="text-sm text-slate-600 leading-relaxed italic border-l-2 border-slate-50 pl-3 mb-3">${item.summary}</p>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${item.source || 'Intel Report'}</div>`;
                            grid.appendChild(card);
                        });
                    }
                    section.appendChild(grid);
                    container.appendChild(section);
                });
            }
        };

        async function run() {
            const btn = document.getElementById('refresh-btn');
            btn.disabled = true;
            UI.reset();
            UI.createSkeleton();
            document.getElementById('meta-text').textContent = "Scanning intelligence channels...";

            try {
                const res = await fetch('/api/digest');
                const data = await res.json();
                if (!res.ok) throw new Error(data.details || data.error || "Connection failed.");
                UI.render(data);
            } catch (e) {
                UI.showError(e.message);
            } finally {
                btn.disabled = false;
            }
        }

        document.getElementById('refresh-btn').onclick = run;
        window.onload = run;
    </script>
</body>
</html>
