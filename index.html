<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline' https://cdn.tailwindcss.com; connect-src https://generativelanguage.googleapis.com; style-src 'unsafe-inline';">
<title>Offshore Wind Digest — Denmark Focused</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background-color: #f8fafc; color: #1e293b; }
  .card { transition: transform 0.2s; }
  .card:hover { transform: translateY(-2px); }
  .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
  @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body class="p-4 md:p-8">
<div class="max-w-3xl mx-auto">
  <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Wind Energy Digest</h1>
      <p id="meta" class="text-sm text-slate-500 mt-1 italic">Scanning for latest news...</p>
    </div>
    <button id="refreshBtn" onclick="runDigest(true)" class="px-5 py-2 bg-white border border-slate-200 rounded-xl shadow-sm hover:bg-slate-50 active:bg-slate-100 transition-colors flex items-center gap-2 text-sm font-medium">
      <span>⟳</span> Refresh
    </button>
  </header>

  <div id="content" class="space-y-8">
    <!-- Content will be loaded here -->
  </div>

  <footer class="mt-12 pt-6 border-t border-slate-200 text-center text-xs text-slate-400">
    Powered by Gemini 2.5 Flash · Real-time data via Google Search Grounding
  </footer>
</div>

<script>
const apiKey = ""; // Provided automatically by the environment
const appId = typeof __app_id !== 'undefined' ? __app_id : 'wind-digest-app';
const CACHE_KEY = `gemini_digest_cache_${appId}`;

function escapeHtml(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function safeUrl(url) {
  try {
    const u = new URL(url);
    return (u.protocol === 'https:' || u.protocol === 'http:') ? url : null;
  } catch {
    return null;
  }
}

const SECTIONS = [
  { key: "infrastructure", label: "Infrastructure", color: "blue", bg: "bg-blue-50", border: "border-blue-200", text: "text-blue-700" },
  { key: "legislation",    label: "Legislation",    color: "green", bg: "bg-green-50", border: "border-green-200", text: "text-green-700" },
  { key: "approvals",      label: "Approvals",      color: "amber", bg: "bg-amber-50", border: "border-amber-200", text: "text-amber-700" },
  { key: "projects",       label: "Projects",       color: "purple", bg: "bg-purple-50", border: "border-purple-200", text: "text-purple-700" },
];

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return null;
    const { date, data } = JSON.parse(raw);
    if (date === todayKey()) return data;
  } catch(e) {}
  return null;
}

function saveCache(data) {
  localStorage.setItem(CACHE_KEY, JSON.stringify({ date: todayKey(), data }));
}

function showSkeleton() {
  document.getElementById("meta").textContent = "Searching and summarizing the web...";
  document.getElementById("content").innerHTML = `
    <div class="space-y-4">
      ${[1, 2, 3].map(() => `
        <div class="p-5 bg-white border border-slate-200 rounded-2xl space-y-3">
          <div class="skeleton h-4 w-1/3 rounded"></div>
          <div class="skeleton h-3 w-full rounded"></div>
          <div class="skeleton h-3 w-2/3 rounded"></div>
        </div>
      `).join("")}
    </div>
  `;
}

function showError(msg) {
  document.getElementById("meta").textContent = "An error occurred";
  const div = document.createElement("div");
  div.className = "p-4 bg-red-50 border border-red-100 text-red-600 rounded-xl text-sm";
  const strong = document.createElement("strong");
  strong.textContent = "Error: ";
  div.appendChild(strong);
  div.appendChild(document.createTextNode(msg));
  const content = document.getElementById("content");
  content.innerHTML = "";
  content.appendChild(div);
  document.getElementById("refreshBtn").disabled = false;
}

function renderDigest(digest) {
  const total = SECTIONS.reduce((s, sec) => s + (digest[sec.key]?.length || 0), 0);
  document.getElementById("meta").textContent = `${digest.date} · Found ${total} items today`;

  const contentHtml = SECTIONS.map(s => {
    const items = digest[s.key] || [];
    const cards = items.length === 0
      ? `<div class="text-sm text-slate-400 py-2">No new items found in this category.</div>`
      : items.map(item => {
          const validUrl = item.url ? safeUrl(item.url) : null;
          return `
          <div class="card bg-white border border-slate-200 rounded-2xl p-5 shadow-sm border-l-4" style="border-left-color: var(--tw-color-${s.color}-500)">
            <div class="text-sm font-semibold mb-2">
              ${validUrl ? `<a href="${escapeHtml(validUrl)}" target="_blank" rel="noopener noreferrer" class="hover:text-blue-600 underline-offset-4 decoration-blue-200 decoration-2">${escapeHtml(item.title)}</a>` : escapeHtml(item.title)}
            </div>
            <p class="text-sm text-slate-600 leading-relaxed mb-3">${escapeHtml(item.summary)}</p>
            <div class="flex items-center justify-between text-[11px] text-slate-400 font-medium uppercase tracking-wider">
              <span>${escapeHtml(item.source || "Unknown Source")}</span>
            </div>
          </div>
        `;}).join("");

    return `
      <section>
        <div class="flex items-center gap-2 mb-4">
          <span class="px-3 py-1 ${s.bg} ${s.text} text-[11px] font-bold rounded-full uppercase tracking-widest border ${s.border}">${s.label}</span>
          <div class="h-[1px] flex-1 bg-slate-100"></div>
        </div>

        <footer class="mt-12 pt-6 border-t border-slate-200 text-center text-[10px] text-slate-400 uppercase tracking-widest">
            Data sourced via Google Search Grounding & Gemini 2.5 Flash
        </footer>
    </div>

    <script>
        /**
         * SECURITY & CONFIGURATION
         */
        const CONFIG = {
            // When deploying to Cloudflare Pages, use '/api/digest' to call your Function.
            // For local development with an exposed key, you can swap this back to the Google URL.
            API_ENDPOINT: '/api/digest', 
            APP_ID: typeof __app_id !== 'undefined' ? __app_id : 'offshore-digest',
            CACHE_VERSION: 'v1'
        };

        const SECTIONS = [
            { id: "infrastructure", label: "Infrastructure", color: "blue" },
            { id: "legislation",    label: "Legislation",    color: "green" },
            { id: "approvals",      label: "Approvals",      color: "amber" },
            { id: "projects",       label: "Projects",       color: "purple" }
        ];

        /**
         * UTILITIES & SANITIZATION
         */
        const Utils = {
            isValidUrl: (url) => {
                try {
                    const parsed = new URL(url);
                    return ['http:', 'https:'].includes(parsed.protocol);
                } catch {
                    return false;
                }
            },
            
            safeSetText: (id, text) => {
                const el = document.getElementById(id);
                if (el) el.textContent = text;
            },

            clearElement: (id) => {
                const el = document.getElementById(id);
                if (el) el.replaceChildren();
            }
        };

        /**
         * STORAGE LAYER
         */
        const Storage = {
            getKey: () => `digest_${CONFIG.APP_ID}_${new Date().toISOString().slice(0, 10)}`,
            save: (data) => localStorage.setItem(Storage.getKey(), JSON.stringify({ version: CONFIG.CACHE_VERSION, data })),
            load: () => {
                const raw = localStorage.getItem(Storage.getKey());
                if (!raw) return null;
                try {
                    const parsed = JSON.parse(raw);
                    return parsed.version === CONFIG.CACHE_VERSION ? parsed.data : null;
                } catch {
                    return null;
                }
            }
        };

        /**
         * DOM GENERATION (Replaces innerHTML for XSS prevention)
         */
        const UI = {
            createSkeleton: () => {
                const container = document.getElementById('content-area');
                Utils.clearElement('content-area');
                for (let i = 0; i < 3; i++) {
                    const skel = document.createElement('div');
                    skel.className = 'p-6 bg-white border border-slate-200 rounded-2xl space-y-4';
                    
                    const h = document.createElement('div');
                    h.className = 'skeleton h-4 w-1/4 rounded';
                    const b1 = document.createElement('div');
                    b1.className = 'skeleton h-3 w-full rounded';
                    const b2 = document.createElement('div');
                    b2.className = 'skeleton h-3 w-2/3 rounded';
                    
                    skel.append(h, b1, b2);
                    container.appendChild(skel);
                }
            },

            renderDigest: (data) => {
                const container = document.getElementById('content-area');
                Utils.clearElement('content-area');
                Utils.safeSetText('meta-text', `${data.date || 'Today'} · Processing complete`);

                SECTIONS.forEach(section => {
                    const items = data[section.id] || [];
                    
                    const sectionWrapper = document.createElement('section');
                    
                    // Header
                    const headerDiv = document.createElement('div');
                    headerDiv.className = 'flex items-center gap-3 mb-4';
                    
                    const badge = document.createElement('span');
                    badge.className = `px-3 py-1 bg-${section.color}-50 text-${section.color}-700 border border-${section.color}-100 text-[10px] font-bold rounded-full uppercase tracking-tighter`;
                    badge.textContent = section.label;
                    
                    const line = document.createElement('div');
                    line.className = 'h-[1px] flex-1 bg-slate-100';
                    
                    headerDiv.append(badge, line);
                    sectionWrapper.appendChild(headerDiv);

                    // Grid
                    const grid = document.createElement('div');
                    grid.className = 'grid gap-4';

                    if (items.length === 0) {
                        const empty = document.createElement('p');
                        empty.className = 'text-xs text-slate-400 italic py-2';
                        empty.textContent = 'No updates found in this category.';
                        grid.appendChild(empty);
                    } else {
                        items.forEach(item => {
                            const card = document.createElement('div');
                            card.className = `bg-white border border-slate-200 rounded-2xl p-5 shadow-sm border-l-4 border-l-${section.color}-500 hover:shadow-md transition-shadow`;
                            
                            const title = document.createElement('h3');
                            title.className = 'text-sm font-bold text-slate-800 mb-2';
                            
                            if (item.url && Utils.isValidUrl(item.url)) {
                                const link = document.createElement('a');
                                link.href = item.url;
                                link.target = '_blank';
                                link.className = 'hover:text-blue-600 underline underline-offset-4 decoration-slate-200';
                                link.textContent = item.title;
                                title.appendChild(link);
                            } else {
                                title.textContent = item.title;
                            }

                            const summary = document.createElement('p');
                            summary.className = 'text-sm text-slate-600 leading-relaxed mb-3';
                            summary.textContent = item.summary;

                            const footer = document.createElement('div');
                            footer.className = 'text-[10px] font-medium text-slate-400 uppercase tracking-wide';
                            footer.textContent = item.source || 'General Source';

                            card.append(title, summary, footer);
                            grid.appendChild(card);
                        });
                    }

                    sectionWrapper.appendChild(grid);
                    container.appendChild(sectionWrapper);
                });
            }
        };

        /**
         * CORE LOGIC
         */
        async function runDigest(force = false) {
            const btn = document.getElementById('refresh-btn');
            btn.disabled = true;

            if (!force) {
                const cached = Storage.load();
                if (cached) {
                    UI.renderDigest(cached);
                    btn.disabled = false;
                    return;
                }
            }

            UI.createSkeleton();
            Utils.safeSetText('meta-text', 'Scanning global maritime news...');

            let delay = 1000;
            for (let i = 0; i < 3; i++) {
                try {
                    // This now calls YOUR Cloudflare Pages Function at /functions/api/digest.js
                    const response = await fetch(CONFIG.API_ENDPOINT);

                    if (!response.ok) throw new Error(`Status ${response.status}`);
                    
                    const data = await response.json();
                    
                    Storage.save(data);
                    UI.renderDigest(data);
                    break;
                } catch (err) {
                    if (i === 2) {
                        Utils.safeSetText('meta-text', 'Check if Cloudflare Function is deployed.');
                        console.error(err);
                    }
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
            btn.disabled = false;
        }

        document.getElementById('refresh-btn').addEventListener('click', () => runDigest(true));
        window.onload = () => runDigest();
    </script>
</body>
</html>
