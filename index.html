<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offshore Wind Digest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-4 md:p-8">
    <div class="max-w-3xl mx-auto">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 border-b border-slate-200 pb-6">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-900">Offshore Wind Digest</h1>
                <p id="status-text" class="text-sm text-slate-500 mt-1 italic">Ready</p>
            </div>
            <div class="flex gap-2">
                <button id="config-btn" class="p-2 text-slate-400 hover:text-slate-600">⚙️</button>
                <button id="refresh-btn" class="px-5 py-2 bg-blue-600 text-white rounded-xl shadow-sm hover:bg-blue-700 active:scale-95 transition-all text-sm font-medium">Refresh Feed</button>
            </div>
        </header>

        <!-- API Key Setup (Hidden by default) -->
        <div id="setup-area" class="mb-8 p-6 bg-white border-2 border-dashed border-slate-200 rounded-2xl hidden">
            <h2 class="text-sm font-bold mb-2">API Configuration</h2>
            <p class="text-xs text-slate-500 mb-4">Paste your Gemini API Key here. It is saved locally in your browser.</p>
            <div class="flex gap-2">
                <input type="password" id="api-key-input" class="flex-1 px-4 py-2 border border-slate-200 rounded-lg text-sm" placeholder="Paste key (AIza...)">
                <button id="save-key-btn" class="px-4 py-2 bg-slate-800 text-white rounded-lg text-sm">Save</button>
            </div>
        </div>

        <!-- Notification Area -->
        <div id="msg-area" class="mb-6 hidden"></div>

        <!-- News Content -->
        <div id="content-area" class="space-y-8">
            <div class="p-12 text-center text-slate-400">
                <p>Click "Refresh Feed" to start.</p>
                <p class="text-xs mt-2">(Make sure your API key is configured in settings ⚙️)</p>
            </div>
        </div>

        <footer class="mt-12 pt-6 border-t border-slate-200 text-center text-[10px] text-slate-400 uppercase tracking-widest">
            Direct-to-Gemini Intelligence · 100% English
        </footer>
    </div>

    <script>
        const SECTIONS = [
            { id: "infrastructure", label: "Infrastructure", color: "blue" },
            { id: "legislation",    label: "Legislation",    color: "green" },
            { id: "approvals",      label: "Approvals",      color: "amber" },
            { id: "projects",       label: "Projects",       color: "purple" }
        ];

        const UI = {
            status: (txt) => document.getElementById('status-text').textContent = txt,
            msg: (txt, type='error') => {
                const area = document.getElementById('msg-area');
                area.classList.remove('hidden');
                area.innerHTML = `<div class="p-4 rounded-xl text-xs font-mono border ${type === 'error' ? 'bg-red-50 border-red-200 text-red-800' : 'bg-amber-50 border-amber-200 text-amber-800'}">${txt}</div>`;
            },
            skeleton: () => {
                document.getElementById('msg-area').classList.add('hidden');
                const area = document.getElementById('content-area');
                area.innerHTML = [1,2,3].map(() => `
                    <div class="p-6 bg-white border border-slate-200 rounded-2xl space-y-4">
                        <div class="skeleton h-4 w-1/4 rounded"></div>
                        <div class="skeleton h-3 w-full rounded"></div>
                    </div>
                `).join('');
            }
        };

        // API Logic
        async function fetchFromGemini(apiKey, useSearch = true) {
            const model = "gemini-1.5-flash"; // Fixed to most reliable version
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            
            const prompt = `Search for the latest 48h news on offshore wind in Denmark. 
            Return a strictly English JSON object with categories: infrastructure, legislation, approvals, projects. 
            Each item needs: title, summary (2 sentences), source, url.`;

            const schema = {
                type: "OBJECT",
                properties: {
                    date: { type: "STRING" },
                    infrastructure: { type: "ARRAY", items: { type: "OBJECT", properties: { title: {type:"STRING"}, summary: {type:"STRING"}, source: {type:"STRING"}, url: {type:"STRING"} } } },
                    legislation: { type: "ARRAY", items: { type: "OBJECT", properties: { title: {type:"STRING"}, summary: {type:"STRING"}, source: {type:"STRING"}, url: {type:"STRING"} } } },
                    approvals: { type: "ARRAY", items: { type: "OBJECT", properties: { title: {type:"STRING"}, summary: {type:"STRING"}, source: {type:"STRING"}, url: {type:"STRING"} } } },
                    projects: { type: "ARRAY", items: { type: "OBJECT", properties: { title: {type:"STRING"}, summary: {type:"STRING"}, source: {type:"STRING"}, url: {type:"STRING"} } } }
                },
                required: ["date", "infrastructure", "legislation", "approvals", "projects"]
            };

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: { responseMimeType: "application/json", responseSchema: schema }
            };
            if (useSearch) payload.tools = [{ google_search: {} }];

            const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
            return res;
        }

        async function start() {
            const key = localStorage.getItem('gemini_api_key');
            if (!key) {
                document.getElementById('setup-area').classList.remove('hidden');
                UI.status("Configuration required");
                return;
            }

            UI.skeleton();
            UI.status("Connecting to Google AI...");

            try {
                // Attempt 1: Search
                let res = await fetchFromGemini(key, true);
                let fallback = false;

                // If Search tool is restricted (Quota 0), retry without it automatically
                if (res.status === 429 || res.status === 400) {
                    UI.status("Search quota limit hit. Retrying in Knowledge Mode...");
                    res = await fetchFromGemini(key, false);
                    fallback = true;
                }

                const data = await res.json();
                if (!res.ok) throw new Error(JSON.stringify(data.error || data));

                const content = JSON.parse(data.candidates[0].content.parts[0].text);
                render(content, fallback);

            } catch (e) {
                UI.msg(e.message);
                UI.status("Failed.");
            }
        }

        function render(data, isFallback) {
            UI.status(`Updated for ${data.date}`);
            const container = document.getElementById('content-area');
            container.innerHTML = "";

            if (isFallback) {
                UI.msg("Note: Live search is currently unavailable for your API key. Showing internal AI data.", "warn");
            }

            SECTIONS.forEach(sec => {
                const items = data[sec.id] || [];
                const sectionHtml = `
                    <section>
                        <div class="flex items-center gap-3 mb-4">
                            <span class="px-3 py-1 bg-${sec.color}-50 text-${sec.color}-700 border border-${sec.color}-100 text-[10px] font-bold rounded-full uppercase tracking-tighter">${sec.label}</span>
                            <div class="h-[1px] flex-1 bg-slate-100"></div>
                        </div>
                        <div class="grid gap-4">
                            ${items.length ? items.map(item => `
                                <div class="bg-white border border-slate-200 rounded-2xl p-5 border-l-4 border-l-${sec.color}-500 shadow-sm">
                                    <h3 class="text-sm font-bold text-slate-800 mb-2">${item.title}</h3>
                                    <p class="text-sm text-slate-600 leading-relaxed mb-3 italic">${item.summary}</p>
                                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${item.source}</div>
                                </div>
                            `).join('') : '<p class="text-xs text-slate-400 italic">No updates.</p>'}
                        </div>
                    </section>
                `;
                container.innerHTML += sectionHtml;
            });
        }

        // Event Listeners
        document.getElementById('config-btn').onclick = () => document.getElementById('setup-area').classList.toggle('hidden');
        document.getElementById('refresh-btn').onclick = start;
        document.getElementById('save-key-btn').onclick = () => {
            const val = document.getElementById('api-key-input').value.trim();
            if (val) {
                localStorage.setItem('gemini_api_key', val);
                document.getElementById('setup-area').classList.add('hidden');
                start();
            }
        };

        // Auto-start if key exists
        if (localStorage.getItem('gemini_api_key')) start();
    </script>
</body>
</html>
