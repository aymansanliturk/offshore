<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self';
           script-src 'unsafe-inline' https://cdn.tailwindcss.com;
           connect-src 'self';
           style-src 'unsafe-inline';">
<title>Offshore Wind Digest — Denmark</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background-color: #f8fafc; color: #1e293b; }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .skeleton {
    background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }
</style>
</head>
<body class="p-4 md:p-8 min-h-screen">
<div class="max-w-3xl mx-auto">

  <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Offshore Wind Digest</h1>
      <p id="meta" class="text-sm text-slate-500 mt-1 italic">Loading latest news...</p>
    </div>
    <button id="refreshBtn"
      class="px-5 py-2 bg-white border border-slate-200 rounded-xl shadow-sm hover:bg-slate-50
             active:bg-slate-100 transition-colors flex items-center gap-2 text-sm font-medium
             text-slate-700 disabled:opacity-40 disabled:cursor-not-allowed">
      <span aria-hidden="true">⟳</span> Refresh
    </button>
  </header>

  <div id="content" class="space-y-8"></div>

  <footer class="mt-12 pt-6 border-t border-slate-200 text-center text-xs text-slate-400">
    Live RSS · Offshore Wind Biz · Google News · Recharge News
  </footer>

</div>
<script>
'use strict';

// ── Configuration ─────────────────────────────────────────────────────────────

const CONFIG = {
  API_ENDPOINT: '/api/digest',
  // Cache key is hour-scoped — data auto-refreshes every hour.
  CACHE_KEY: 'offshore_rss_' + new Date().toISOString().slice(0, 13),
  TIMEOUT_MS: 30000,
  MAX_RETRIES: 2,
};

const SECTIONS = [
  { id: 'infrastructure', label: 'Infrastructure',
    badge: 'bg-blue-50 text-blue-700 border-blue-200',      accent: 'border-l-blue-500'   },
  { id: 'legislation',    label: 'Legislation',
    badge: 'bg-green-50 text-green-700 border-green-200',   accent: 'border-l-green-500'  },
  { id: 'approvals',      label: 'Approvals',
    badge: 'bg-amber-50 text-amber-700 border-amber-200',   accent: 'border-l-amber-500'  },
  { id: 'projects',       label: 'Projects',
    badge: 'bg-purple-50 text-purple-700 border-purple-200', accent: 'border-l-purple-500' },
];

// ── Cache ─────────────────────────────────────────────────────────────────────

function saveCache(data) {
  try { localStorage.setItem(CONFIG.CACHE_KEY, JSON.stringify(data)); } catch {}
}

function loadCache() {
  try { return JSON.parse(localStorage.getItem(CONFIG.CACHE_KEY)) || null; } catch { return null; }
}

// ── Utilities ─────────────────────────────────────────────────────────────────

/** Return a validated http/https URL or null. Prevents javascript: injection. */
function safeUrl(url) {
  try {
    const u = new URL(url);
    return (u.protocol === 'https:' || u.protocol === 'http:') ? url : null;
  } catch { return null; }
}

function relativeTime(dateStr) {
  if (!dateStr) return '';
  const date = new Date(dateStr);
  if (isNaN(date.getTime())) return '';
  const diffHrs = Math.floor((Date.now() - date.getTime()) / 3600000);
  if (diffHrs < 1) return 'just now';
  if (diffHrs < 24) return `${diffHrs}h ago`;
  const diffDays = Math.floor(diffHrs / 24);
  return diffDays === 1 ? '1 day ago' : `${diffDays} days ago`;
}

function setMeta(text) {
  document.getElementById('meta').textContent = text;
}

// ── UI States ─────────────────────────────────────────────────────────────────

function showSkeleton() {
  setMeta('Fetching latest offshore wind news…');
  const content = document.getElementById('content');
  content.replaceChildren();
  for (let i = 0; i < 4; i++) {
    const card = document.createElement('div');
    card.className = 'p-6 bg-white border border-slate-200 rounded-2xl space-y-3';
    // Static hardcoded HTML — safe to use innerHTML here (no user/API data).
    card.innerHTML =
      '<div class="skeleton h-3 w-1/4 rounded"></div>' +
      '<div class="skeleton h-4 w-3/4 rounded mt-1"></div>' +
      '<div class="skeleton h-3 w-full rounded"></div>' +
      '<div class="skeleton h-3 w-2/3 rounded"></div>';
    content.appendChild(card);
  }
}

function showError(message) {
  setMeta('Failed to load digest');
  const content = document.getElementById('content');
  content.replaceChildren();

  const box = document.createElement('div');
  box.className = 'p-5 bg-red-50 border border-red-200 rounded-2xl space-y-2';

  const heading = document.createElement('p');
  heading.className = 'text-sm font-semibold text-red-700';
  heading.textContent = 'Could not load digest';

  const detail = document.createElement('p');
  detail.className = 'text-sm text-red-600 font-mono break-all';
  detail.textContent = message;

  box.append(heading, detail);
  content.appendChild(box);
  document.getElementById('refreshBtn').disabled = false;
}

// ── Render ────────────────────────────────────────────────────────────────────

/**
 * Render the digest data into the content area.
 * All RSS-provided text is set via textContent — never innerHTML.
 */
function renderDigest(data) {
  const total = SECTIONS.reduce((sum, s) => sum + (data[s.id]?.length || 0), 0);
  const srcNote = data.sourcesLive > 0
    ? ` · ${data.sourcesLive} source${data.sourcesLive !== 1 ? 's' : ''} live`
    : '';
  setMeta(`${data.date || 'Today'} · ${total} item${total !== 1 ? 's' : ''}${srcNote}`);

  const content = document.getElementById('content');
  content.replaceChildren();

  // No articles at all — sources may be down.
  if (total === 0) {
    const notice = document.createElement('div');
    notice.className = 'p-5 bg-slate-50 border border-slate-200 rounded-2xl';
    const msg = document.createElement('p');
    msg.className = 'text-sm text-slate-500';
    msg.textContent =
      'No articles found right now. RSS sources may be temporarily unavailable — try refreshing in a few minutes.';
    notice.appendChild(msg);
    content.appendChild(notice);
    document.getElementById('refreshBtn').disabled = false;
    return;
  }

  SECTIONS.forEach(section => {
    const items = Array.isArray(data[section.id]) ? data[section.id] : [];

    const wrapper = document.createElement('section');

    // Section header badge + horizontal rule.
    const headerRow = document.createElement('div');
    headerRow.className = 'flex items-center gap-3 mb-4';

    const badge = document.createElement('span');
    badge.className =
      `px-3 py-1 text-[11px] font-bold rounded-full uppercase tracking-widest border ${section.badge}`;
    badge.textContent = section.label;

    const divider = document.createElement('div');
    divider.className = 'h-px flex-1 bg-slate-100';

    headerRow.append(badge, divider);
    wrapper.appendChild(headerRow);

    const grid = document.createElement('div');
    grid.className = 'grid gap-4';

    if (items.length === 0) {
      const empty = document.createElement('p');
      empty.className = 'text-sm text-slate-400 italic py-2 pl-1';
      empty.textContent = 'No updates found in this category.';
      grid.appendChild(empty);
    } else {
      items.forEach(item => {
        const card = document.createElement('div');
        card.className =
          `bg-white border border-slate-200 border-l-4 ${section.accent} ` +
          `rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow duration-200`;

        // Title — linked if a valid URL is available.
        const titleEl = document.createElement('div');
        titleEl.className = 'text-sm font-semibold text-slate-800 mb-2';

        const validUrl = item.url ? safeUrl(item.url) : null;
        if (validUrl) {
          const link = document.createElement('a');
          link.href = validUrl;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.className =
            'hover:text-blue-600 underline underline-offset-4 ' +
            'decoration-slate-200 hover:decoration-blue-300 transition-colors';
          link.textContent = item.title || '(untitled)';
          titleEl.appendChild(link);
        } else {
          titleEl.textContent = item.title || '(untitled)';
        }

        card.appendChild(titleEl);

        // Description snippet — only shown when available.
        if (item.description) {
          const desc = document.createElement('p');
          desc.className =
            'text-sm text-slate-500 leading-relaxed border-l-2 border-slate-100 pl-3 mb-3';
          desc.textContent = item.description;
          card.appendChild(desc);
        }

        // Footer: source name + relative age.
        const footer = document.createElement('div');
        footer.className = 'flex items-center justify-between mt-2';

        const source = document.createElement('span');
        source.className = 'text-[11px] font-medium text-slate-400 uppercase tracking-wider';
        source.textContent = item.source || 'Unknown Source';

        const age = document.createElement('span');
        age.className = 'text-[11px] text-slate-300';
        age.textContent = relativeTime(item.pubDate);

        footer.append(source, age);
        card.appendChild(footer);

        grid.appendChild(card);
      });
    }

    wrapper.appendChild(grid);
    content.appendChild(wrapper);
  });

  document.getElementById('refreshBtn').disabled = false;
}

// ── Core fetch ────────────────────────────────────────────────────────────────

async function runDigest(forceRefresh = false) {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;

  if (!forceRefresh) {
    const cached = loadCache();
    if (cached) { renderDigest(cached); return; }
  }

  showSkeleton();

  let delay = 2000;
  for (let attempt = 0; attempt < CONFIG.MAX_RETRIES; attempt++) {
    try {
      const res = await fetch(CONFIG.API_ENDPOINT, {
        signal: AbortSignal.timeout(CONFIG.TIMEOUT_MS),
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || `HTTP ${res.status}`);
      }

      saveCache(data);
      renderDigest(data);
      return;

    } catch (err) {
      if (attempt < CONFIG.MAX_RETRIES - 1) {
        setMeta(`Retrying… (attempt ${attempt + 2}/${CONFIG.MAX_RETRIES})`);
        await new Promise(r => setTimeout(r, delay));
        delay *= 2;
      } else {
        showError(err?.message || 'Unknown error — check the browser console for details.');
      }
    }
  }
}

document.getElementById('refreshBtn').addEventListener('click', () => runDigest(true));
window.onload = () => runDigest();
</script>
</body>
</html>
